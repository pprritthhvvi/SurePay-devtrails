version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: surepay_postgres
    environment:
      POSTGRES_USER: surepay
      POSTGRES_PASSWORD: surepay_dev_password
      POSTGRES_DB: surepay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U surepay" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surepay_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: surepay_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surepay_network

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: surepay_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: surepay
      RABBITMQ_DEFAULT_PASS: surepay_dev_password
    ports:
      - "5672:5672" # AMQP port
      - "15672:15672" # Management UI
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - surepay_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surepay_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://surepay:surepay_dev_password@postgres:5432/surepay_db
      # ... (leave the rest of the variables exactly as they are)
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://surepay:surepay_dev_password@rabbitmq:5672//
      ENV: development
      DEBUG: "true"
      JWT_SECRET: dev_jwt_secret_key_change_in_production
      JWT_ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - surepay_network

  # Celery Worker (for async tasks)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surepay_celery_worker
    environment:
      DATABASE_URL: postgresql://surepay:surepay_dev_password@postgres:5432/surepay_db
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://surepay:surepay_dev_password@rabbitmq:5672//
      ENV: development
    depends_on:
      - postgres
      - redis
      - rabbitmq
    volumes:
      - ./backend:/app
    command: celery -A app.tasks worker --loglevel=info
    networks:
      - surepay_network

  # pgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: surepay_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@surepay.com
      PGADMIN_DEFAULT_PASSWORD: surepay_dev_password
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - surepay_network

volumes:
  postgres_data:


networks:
  surepay_network:
    driver: bridge
